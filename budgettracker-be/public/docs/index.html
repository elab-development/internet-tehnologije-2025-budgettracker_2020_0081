<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Tracker API Docs</title>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

  <style>
    body { margin: 0; }
    .topbar { display: none; } 
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: "./openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout",
        persistAuthorization: true,

        // Aliasi za 2 logina u dokumentaciji:
        // /api/login/user  -> /api/login
        // /api/login/admin -> /api/login
        requestInterceptor: (req) => {
          try {
            req.url = req.url
              .replace(/\/api\/login\/user$/, "/api/login")
              .replace(/\/api\/login\/admin$/, "/api/login");
          } catch (e) {}
          return req;
        },
      });
    };
  </script>
</body>
</html>
